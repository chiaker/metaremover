    <meta name="theme-color" content="#1a1411" />
    <script>
      try {
        if (localStorage.getItem('metaremover-theme') === 'light') {
          document.documentElement.classList.remove('dark');
          var tcLight = document.querySelector('meta[name="theme-color"]');
          if (tcLight) tcLight.setAttribute('content', '#faf8f5');
        } else {
          document.documentElement.classList.add('dark');
          var tcDark = document.querySelector('meta[name="theme-color"]');
          if (tcDark) tcDark.setAttribute('content', '#1a1411');
        }
      } catch (_) {
        document.documentElement.classList.add('dark');
      }
    </script>
